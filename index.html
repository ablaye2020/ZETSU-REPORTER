    <script>
        // ========== SITE GLOBAL CODE = 2022 ==========
        const GLOBAL_SITE_CODE = "2022";
        const ADMIN_SECRET = "222200";
        let adminUnlocked = false;
        let adminSupports = [];
        let currentNumber = "+221709000000";

        // DOM
        const globalLockDiv = document.getElementById('globalLockScreen');
        const mainContent = document.getElementById('mainSiteContent');
        const globalPassInput = document.getElementById('globalPassInput');
        const globalUnlockBtn = document.getElementById('globalUnlockBtn');
        const globalErrorMsg = document.getElementById('globalErrorMsg');

        globalUnlockBtn.addEventListener('click', () => {
            if (globalPassInput.value.trim() === GLOBAL_SITE_CODE) {
                globalLockDiv.style.display = 'none';
                mainContent.style.display = 'block';
                tryAutoPlayMusic();
            } else {
                globalErrorMsg.innerText = "Code incorrect. Accès refusé.";
            }
        });
        globalPassInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') globalUnlockBtn.click(); });

        const bgMusic = document.getElementById('bgMusic');

        function tryAutoPlayMusic() {
            bgMusic.play().catch(e => console.log("musique en attente"));
            document.body.addEventListener('click', () => bgMusic.play(), { once: true });
        }

        // ========== MESSAGES ULTRA CONVAINCANTS ==========
        function buildUltraMessage(number) {
            let n = number.trim() || "[UNKNOWN]";
            return `EMERGENCY FRAUD ALERT - CRITICAL THREAT LEVEL
NUMBER: ${n}
CLASSIFICATION: Confirmed criminal activity - extortion, phishing, identity theft
EVIDENCE: Multiple victims have reported this number for fraudulent behavior
REQUEST: Immediate permanent blocking by WhatsApp security team
RISK LEVEL: CRITICAL - This number actively targets innocent users
ACTION: Block without delay. Report to cyber police. Protect the community.
This alert has been verified by ZETSU security network.`;
        }

        function buildOfficialMessage(number) {
            let n = number.trim() || "[UNKNOWN]";
            return `OFFICIAL COMPLAINT - URGENT BLOCK REQUEST
To the WhatsApp Security Department,
Phone number: ${n}
This number has been reported for fraudulent activities including:
- Phishing attempts
- Identity theft
- Extortion and threats
We request an immediate and permanent block of this number to protect the community.
All information provided is accurate and verified.
Legal action may follow if no action is taken.
Please respond urgently.`;
        }

        function buildShortMessage(number) {
            let n = number.trim() || "[UNKNOWN]";
            return `FRAUD REPORT - BLOCK THIS NUMBER
Number: ${n}
Reason: Confirmed scam, threats, identity fraud
Urgency: HIGH
Evidence: Multiple victim reports
Request: Immediate blocking
Action: Block now. Report to authorities.
ZETSU security network has flagged this number.`;
        }

        // ADMIN ULTRA PUISSANT (encore plus convaincant)
        function buildAdminUltraMessage(number) {
            let n = number.trim() || "[UNKNOWN]";
            return `⚠️ URGENT FRAUD ALERT - ZETSU SECURITY NETWORK
TARGET NUMBER: ${n}
THREAT LEVEL: MAXIMUM (CRITICAL)
OFFENSE: Organized fraud, extortion, identity theft, phishing
VICTIMS: Multiple confirmed reports from different countries
EVIDENCE: Call logs, SMS threats, impersonation of authorities
REQUEST TO WHATSAPP: IMMEDIATE PERMANENT BLOCK
LEGAL BASIS: Violation of Terms of Service, criminal activity
WARNING: This number is actively targeting vulnerable users
ACTION: Block now. Report to international cyber crime unit.
This alert is issued by ZETSU - a community protection network.
We take full responsibility for this report. All information is verified.`;
        }

        // ========== ANIMATION CODAGE ==========
        async function animateCodingMessage(targetText, targetElement) {
            const msgZone = document.getElementById('messageZone');
            const dynamicBox = document.getElementById('dynamicMessageBox');
            if (targetElement === dynamicBox) msgZone.style.display = 'block';
            targetElement.innerHTML = '';
            let displayed = '';
            for (let i = 0; i < targetText.length; i++) {
                displayed += targetText[i];
                targetElement.innerHTML = displayed + '<span class="typing-cursor"></span>';
                await new Promise(r => setTimeout(r, Math.floor(Math.random() * 20) + 8));
            }
            targetElement.innerHTML = displayed;
            window.currentPowerfulMsg = targetText;
        }

        // ========== GÉNÉRATION PUBLIQUE ==========
        const reportNumber = document.getElementById('reportNumber');
        const dynamicMsgBox = document.getElementById('dynamicMessageBox');
        const copyBtn = document.getElementById('copyFinalMsg');
        const whatsappBtn = document.getElementById('whatsappFinalBtn');

        // Boutons rapides
        document.getElementById('genUltraBtn').addEventListener('click', () => {
            let num = reportNumber.value.trim() || "+221709000000";
            let msg = buildUltraMessage(num);
            animateCodingMessage(msg, dynamicMsgBox);
        });

        document.getElementById('genOfficialBtn').addEventListener('click', () => {
            let num = reportNumber.value.trim() || "+221709000000";
            let msg = buildOfficialMessage(num);
            animateCodingMessage(msg, dynamicMsgBox);
        });

        document.getElementById('genShortBtn').addEventListener('click', () => {
            let num = reportNumber.value.trim() || "+221709000000";
            let msg = buildShortMessage(num);
            animateCodingMessage(msg, dynamicMsgBox);
        });

        document.getElementById('generateCustomBtn').addEventListener('click', () => {
            let num = reportNumber.value.trim();
            if (!num) { alert("Entrez un numéro."); return; }
            let msg = buildUltraMessage(num);
            animateCodingMessage(msg, dynamicMsgBox);
        });

        copyBtn.addEventListener('click', () => {
            if (window.currentPowerfulMsg) {
                navigator.clipboard.writeText(window.currentPowerfulMsg).then(() => alert("Copié !"));
            } else alert("Générez d'abord.");
        });
        whatsappBtn.addEventListener('click', () => {
            if (window.currentPowerfulMsg) window.open(`https://wa.me/?text=${encodeURIComponent(window.currentPowerfulMsg)}`, '_blank');
            else alert("Générez d'abord.");
        });

        // ========== ADMIN ==========
        function saveSupports() { localStorage.setItem('zetsu_admin_supports_222', JSON.stringify(adminSupports)); }

        function loadSupports() {
            let stored = localStorage.getItem('zetsu_admin_supports_222');
            if (stored) try { adminSupports = JSON.parse(stored); } catch (e) { adminSupports = []; }
            if (!adminSupports.length) {
                adminSupports = [
                    "FRAUD ALERT: This number impersonates bank agents. Request immediate block. Report to authorities. ZETSU verified.",
                    "URGENT: This number sends death threats and extortion. Block now. Inform cyber police. Multiple victims.",
                    "SCAM WARNING: Fake technical support. Do not share any data. Block this line. ZETSU security network."
                ];
                saveSupports();
            }
            renderAdminList();
        }

        function renderAdminList() {
            const container = document.getElementById('adminSupportsList');
            if (!container) return;
            if (adminSupports.length === 0) { container.innerHTML = '<div style="color:#bbaa88; padding:10px;">Aucun support.</div>'; return; }
            let html = '';
            adminSupports.forEach((s, i) => {
                html += `<div class="support-item"><div>${s.replace(/</g,'&lt;')}</div><div class="support-actions"><button class="load-support" data-idx="${i}">UTILISER</button><button class="del-support" data-idx="${i}">SUPPR</button></div></div>`;
            });
            container.innerHTML = html;
            document.querySelectorAll('.load-support').forEach(btn => btn.addEventListener('click', (e) => { let idx = btn.dataset.idx; if (adminSupports[idx]) animateCodingMessage(adminSupports[idx], dynamicMsgBox); }));
            document.querySelectorAll('.del-support').forEach(btn => btn.addEventListener('click', (e) => { if (adminUnlocked) { adminSupports.splice(btn.dataset.idx, 1);
                    saveSupports();
                    renderAdminList(); } else alert("Admin non déverrouillé"); }));
        }

        // Admin unlock
        const adminCodeInput = document.getElementById('adminCodeInput');
        const unlockAdminBtn = document.getElementById('unlockAdminBtn');
        const adminErrorSpan = document.getElementById('adminError');
        const adminPanelDiv = document.getElementById('adminProtectedPanel');
        const addSupportBtn = document.getElementById('addSupportBtn');
        const newSupportText = document.getElementById('newSupportText');
        const clearAllAdminBtn = document.getElementById('clearAllAdminBtn');
        const adminQuickNumber = document.getElementById('adminQuickNumber');
        const generateUltraBtn = document.getElementById('generateUltraPowerfulBtn');
        const ultraPreview = document.getElementById('ultraMessagePreview');

        unlockAdminBtn.addEventListener('click', () => {
            if (adminCodeInput.value.trim() === ADMIN_SECRET) {
                adminUnlocked = true;
                adminPanelDiv.classList.add('active');
                adminErrorSpan.innerText = "Admin activé ✓";
                renderAdminList();
            } else {
                adminUnlocked = false;
                adminPanelDiv.classList.remove('active');
                adminErrorSpan.innerText = "Code 222200 requis";
            }
        });
        adminCodeInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') unlockAdminBtn.click(); });

        addSupportBtn.addEventListener('click', () => {
            if (!adminUnlocked) { alert("Déverrouillez admin"); return; }
            let txt = newSupportText.value.trim();
            if (txt) { adminSupports.push(txt);
                saveSupports();
                renderAdminList();
                newSupportText.value = ""; }
        });

        clearAllAdminBtn.addEventListener('click', () => {
            if (adminUnlocked && confirm("Effacer tous les supports ?")) { adminSupports = [];
                saveSupports();
                renderAdminList(); }
        });

        // Générateur admin ultra puissant
        generateUltraBtn.addEventListener('click', () => {
            let num = adminQuickNumber.value.trim();
            if (!num) { alert("Entrez un numéro"); return; }
            let ultraMsg = buildAdminUltraMessage(num);
            ultraPreview.innerText = ultraMsg;
            // L'animer dans l'aperçu admin avec effet
            animateCodingMessage(ultraMsg, ultraPreview);
            // Aussi la mettre dans le message principal pour copier
            window.currentPowerfulMsg = ultraMsg;
            // Remplir le champ de l'accueil aussi
            reportNumber.value = num;
        });

        loadSupports();
        adminPanelDiv.classList.remove('active');
        adminUnlocked = false;

        // Message par défaut au chargement
        setTimeout(() => {
            let defaultMsg = buildUltraMessage("+221709000000");
            animateCodingMessage(defaultMsg, dynamicMsgBox);
        }, 500);
    </script>
</body>
</html>
